<!doctype html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OMNi Plus 얼음정수기</title>
  <style>
    :root {
      --mobile-max: 430px;
      --line: #e8e8e8;
      --surface: #ffffff;
      --page-bg: #f3f3f3;
      --text: #222222;
      --muted: #666666;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--page-bg);
    }

    body {
      font-size: 13px;
      color: var(--text);
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      padding-bottom: 92px;
    }

    * {
      box-sizing: border-box;
      max-width: 100%;
      word-break: break-all;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
    }

    p {
      margin: 0;
    }

    .info__detail {
      width: 100%;
      max-width: var(--mobile-max);
      margin: 0 auto;
      background: var(--surface);
      min-height: 100vh;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.02);
    }

    .info__detail__inner,
    .info__detail__content {
      width: 100%;
    }

    .image-block {
      text-align: center;
      line-height: 0;
    }

    .info__detail__more {
      display: none;
    }

    .info__detail__more-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 52px;
      border: 1px solid #111111;
      background: #ffffff;
      color: #111111;
      font-size: 16px;
      font-weight: 700;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--mobile-max);
      background: #fff;
      border-top: 1px solid #e8e8e8;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
    }

    .consultant-name {
      font-size: 13px;
      font-weight: 700;
      color: #222;
      flex: 1;
      min-width: 86px;
    }

    .consultant-name span {
      display: block;
      font-size: 11px;
      color: #888;
      font-weight: 400;
    }

    .btn-call {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .btn-call.tel { background: #1a7cff; color: #fff; }
    .btn-call.sms { background: #222; color: #fff; }
    .btn-call svg { width: 15px; height: 15px; fill: #fff; }

    @media (max-width: 430px) {
      .bottom-bar,
      .info__detail {
        max-width: 100%;
      }
    }

    @media (max-width: 380px) {
      .bottom-bar {
        gap: 8px;
      }

      .consultant-name {
        min-width: 76px;
        font-size: 12px;
      }

      .consultant-name span {
        font-size: 10px;
      }

      .btn-call {
        min-height: 40px;
        padding: 9px 10px;
        font-size: 12px;
      }
    }
  </style>
</head>
