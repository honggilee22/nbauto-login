<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;font-size:18px;line-height:1.9;background:#f0f0f0;color:#1a1a2e;overflow-x:hidden;padding-bottom:90px}
.page-wrap{max-width:480px;margin:0 auto;background:#f6fbff;position:relative;box-shadow:0 0 40px rgba(0,0,0,.15)}
:root{--coway:#00b4d8;--coway-dark:#0090b0;--navy:#001f3a;--gold:#f59e0b;--red:#e53e3e;--green:#22c55e}

/* ── HEADER ── */
.site-header{
  position:sticky;top:0;z-index:800;
  background:rgba(255,255,255,.97);backdrop-filter:blur(10px);
  border-bottom:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
  padding:14px 30px;
  max-width:480px;margin-left:auto;margin-right:auto;
  left:0;right:0;
}
.logo-txt{font-family:Arial,sans-serif;font-size:29px;font-weight:900;color:#00b4d8;letter-spacing:-.5px}
.header-ticker{
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:999px;
  min-height:40px;
  padding:0 14px;
  display:flex;
  align-items:center;
  gap:9px;
  box-shadow:0 8px 24px rgba(15,23,42,.08);
  flex-shrink:0;
}
.header-spinner{
  width:18px;
  height:18px;
  border-radius:50%;
  border:3px solid #ffd0ca;
  border-top-color:#ff5c4d;
  border-right-color:#ff7b6d;
  animation:spin .95s linear infinite;
}
.header-ticker-text{
  font-size:12px;
  font-weight:800;
  line-height:1.2;
  letter-spacing:-.03em;
  color:#111827;
  white-space:normal;
  word-break:keep-all;
  text-align:right;
}
.header-ticker-text strong{color:#ff4b37}

/* ── TOP BANNER ── */
.top-banner{
  animation:fadeInDown .8s ease both;
}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
.top-banner__item{
  padding:54px 18px 58px;
}
.top-banner__item:first-child{
  padding-top:18px;
}
.top-banner__item:nth-child(odd){
  background:
    radial-gradient(circle at top left,rgba(59,130,246,.10),transparent 28%),
    linear-gradient(180deg,#ffffff 0%,#f6fbff 100%);
}
.top-banner__item:nth-child(even){
  background:
    radial-gradient(circle at top right,rgba(14,165,233,.12),transparent 26%),
    linear-gradient(180deg,#eef8ff 0%,#ffffff 100%);
}
.top-banner__item + .top-banner__item{
  border-top:1px solid #dbeafe;
}
.top-banner__item img{
  width:100%;display:block;border-radius:18px;
  background:#fff;padding:8px;border:1px solid #e3effa;
  box-shadow:0 12px 30px rgba(15,23,42,.08)
}
.top-banner__stage{position:relative}
.top-banner__stage img{padding:0}
.top-banner__hotspot{
  position:absolute;z-index:2;border:none;background:transparent;cursor:pointer;
  border-radius:18px
}
.top-banner__hotspot:focus-visible{
  outline:3px solid rgba(255,255,255,.95);
  outline-offset:2px;
  box-shadow:0 0 0 4px rgba(0,180,216,.45);
}
.top-banner__hotspot--spec-1{left:5.2%;top:48.7%;width:44.3%;height:25.4%}
.top-banner__hotspot--spec-2{left:50.4%;top:48.7%;width:44.4%;height:25.4%}
.top-banner__hotspot--spec-3{left:5.2%;top:74.6%;width:44.3%;height:24.7%}
.top-banner__hotspot--spec-4{left:50.4%;top:74.6%;width:44.4%;height:24.7%}
.hero-copy{
  background:
    radial-gradient(circle at top right,rgba(0,180,216,.16),transparent 34%),
    linear-gradient(180deg,#ffffff 0%,#f0fbff 100%);
  padding:40px 30px 36px;
  text-align:center;
  border-bottom:1px solid #d9f3fb;
  position:relative;
  overflow:hidden;
}
.hero-copy::before{
  content:"";
  position:absolute;
  top:0;left:-35%;
  width:36%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.78),transparent);
  transform:skewX(-22deg);
  animation:heroSweep 2.8s ease-in-out infinite;
}
.hero-copy__title{
  position:relative;
  z-index:1;
  font-size:36px;
  line-height:1.32;
  font-weight:900;
  color:var(--navy);
  word-break:keep-all;
  letter-spacing:-.03em;
  animation:heroPop .9s ease both,heroGlow 2.1s ease-in-out infinite;
}
.hero-copy__title strong{
  color:var(--coway);
  display:inline-block;
  padding:2px 10px 4px;
  border-radius:999px;
  background:linear-gradient(90deg,rgba(0,180,216,.12),rgba(103,232,249,.28));
  box-shadow:0 8px 22px rgba(0,180,216,.12);
  animation:heroPulse 1.5s ease-in-out infinite;
}
.hero-copy__sub{
  position:relative;
  z-index:1;
  margin-top:14px;
  font-size:20px;
  line-height:1.7;
  color:#4b5563;
  word-break:keep-all;
}
.hero-copy__title,
.hero-copy__sub,
.status-card__title,
.status-badge,
.status-sub,
.sec-title,
.sec-sub,
.rcard-quote,
.gift-guide-sub,
.form-title,
.product-modal__title,
.benefit-hotspot-note,
.biz-info,
.img-btn-label{
  word-break:keep-all;
  overflow-wrap:break-word;
}
.hero-copy__meta{
  position:relative;
  z-index:1;
  display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
  margin-top:18px;
}
.hero-copy__pill{
  display:inline-flex;align-items:center;justify-content:center;
  min-height:38px;padding:8px 14px;border-radius:999px;
  background:#fff;border:1px solid #d8eef7;color:#0f4aa3;
  font-size:14px;font-weight:800;box-shadow:0 8px 20px rgba(15,23,42,.06)
}
.hero-copy__cta{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;max-width:340px;margin:20px auto 0;border:none;border-bottom:4px solid #0f4aa3;border-radius:20px;
  background:linear-gradient(180deg,#27b6ff 0%,#1580f5 100%);color:#fff;padding:18px 18px;
  font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:-.02em;
  box-shadow:0 16px 32px rgba(21,128,245,.28), inset 0 1px 0 rgba(255,255,255,.28);
  transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
}
.hero-copy__cta::after{content:'›';font-size:24px;line-height:1;transform:translateY(-1px)}
.hero-copy__cta:hover{transform:translateY(-1px);filter:saturate(1.06);box-shadow:0 20px 36px rgba(21,128,245,.34), inset 0 1px 0 rgba(255,255,255,.28)}
.hero-copy__cta:active{transform:translateY(2px);box-shadow:0 8px 18px rgba(21,128,245,.22), inset 0 1px 0 rgba(255,255,255,.2)}
.hero-copy__cta:focus-visible{outline:3px solid rgba(56,189,248,.32);outline-offset:3px}
@keyframes heroPop{from{opacity:0;transform:translateY(12px) scale(.96)}to{opacity:1;transform:none}}
@keyframes heroGlow{0%,100%{text-shadow:0 0 0 rgba(0,180,216,0)}50%{text-shadow:0 0 22px rgba(0,180,216,.2)}}
@keyframes heroPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
@keyframes heroSweep{0%{left:-42%;opacity:0}18%{opacity:1}52%{left:108%;opacity:.85}100%{left:108%;opacity:0}}
.countdown-overlay{
  background:#fff;padding:32px 30px 36px;text-align:center;
  border-bottom:3px solid var(--coway);
}
.countdown-label{font-size:15px;color:#888;margin-bottom:14px}
.countdown-label span{color:var(--coway);font-weight:700}
.countdown-boxes{display:flex;justify-content:center;gap:12px;margin-bottom:28px}
.cd-box{
  background:#3a3a3a;color:#fff;border-radius:8px;
  width:68px;padding:12px 8px 8px;text-align:center;
}
.cd-num{font-size:36px;font-weight:900;font-variant-numeric:tabular-nums;display:block;line-height:1}
.cd-unit{font-size:12px;color:#aaa;margin-top:4px;text-transform:uppercase}
.cd-sep{font-size:32px;font-weight:900;color:#3a3a3a;align-self:center;margin-bottom:14px}
.btn-event{
  display:block;max-width:300px;margin:0 auto;
  background:var(--red);color:#fff;border:none;border-radius:8px;
  padding:16px;font-size:18px;font-weight:700;cursor:pointer;
  font-family:inherit;animation:pulse-btn 2s ease-in-out infinite;
}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(229,62,62,.5)}50%{box-shadow:0 0 0 10px rgba(229,62,62,0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATUS ── */
.status-wrap{
  background:linear-gradient(180deg,#edf8ff 0%,#f7fcff 100%);
  padding:52px 24px;
  border-top:1px solid #dceefb;
  border-bottom:1px solid #dceefb
}
.live-apply-wrap{
  background:linear-gradient(180deg,#eef8ff 0%,#ffffff 100%);
  padding:60px 18px 66px;
  border-top:1px solid #dceefb;
  border-bottom:1px solid #dceefb;
}
.live-apply-wrap__inner{max-width:480px;margin:0 auto}
.live-apply-count{
  text-align:center;background:#fff;border-radius:18px;padding:18px 14px 16px;
  border:1px solid #d7ebfb;box-shadow:0 10px 26px rgba(15,23,42,.06);margin-bottom:14px
}
.live-apply-count__eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:16px;font-weight:900;color:#0f3f82;letter-spacing:.02em
}
.live-apply-count__dot{font-size:14px;line-height:1}
.live-apply-count__cap{
  margin-top:10px;font-size:15px;font-weight:900;color:#0f4aa3
}
.live-apply-count__main{margin-top:6px;line-height:1.1;font-weight:900}
.live-apply-count__num{
  font-size:40px;
  background:linear-gradient(90deg,#ff5aa5 0%,#c026d3 42%,#2563eb 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-variant-numeric:tabular-nums
}
.live-apply-count__suffix{
  font-size:34px;margin-left:2px;
  background:linear-gradient(90deg,#7dd3fc 0%,#2563eb 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent
}
.live-apply-count__label{
  font-size:34px;margin-left:6px;font-weight:900;color:#2563eb
}
.live-apply-count__sub{
  margin-top:10px;font-size:16px;color:#475569;font-weight:700
}
.live-apply-count__sub strong{
  color:#ef4444;font-size:20px;font-weight:900;font-variant-numeric:tabular-nums
}
.live-apply-frame{
  background:#fff;border-radius:16px;padding:12px;border:1px solid #d7ebfb;
  box-shadow:0 10px 26px rgba(15,23,42,.06)
}
.live-apply-frame iframe{display:block;border-radius:12px}
.live-apply-form{
  margin-top:18px;background:#fff;border-radius:16px;padding:12px;border:1px solid #d7ebfb;
  box-shadow:0 10px 26px rgba(15,23,42,.06)
}
.live-apply-form iframe{display:block;border-radius:12px}
.status-card{background:#fff;border-radius:20px;padding:32px 28px;box-shadow:0 6px 28px rgba(0,180,216,.1);max-width:480px;margin:0 auto;text-align:center;border:1.5px solid #b3e9f7}
.status-card__eye{color:var(--coway);font-weight:700;font-size:17px;margin-bottom:8px}
.status-card__title{font-size:29px;font-weight:900;margin-bottom:14px}
.status-badge{display:inline-block;background:#e0f7fa;color:var(--coway-dark);border:1px solid #b3e9f7;border-radius:999px;padding:9px 18px;font-size:17px;font-weight:700;margin-bottom:18px}
.status-num{font-size:78px;font-weight:900;color:var(--coway);line-height:1;margin-bottom:8px;font-variant-numeric:tabular-nums}
.status-num-label{font-size:22px;color:#555;margin-bottom:20px}
.status-sub{font-size:17px;color:#666;margin-bottom:22px}
.progress-bar{height:10px;border-radius:10px;background:#e0f7fa;overflow:hidden;margin-bottom:24px}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#67e8f9,#00b4d8,#f59e0b);width:0%;transition:width 1.8s cubic-bezier(.4,0,.2,1)}
.status-boxes{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.sbox{border-radius:12px;padding:16px 10px;text-align:center}
.sbox.red{background:#fff5f5;border:1px solid #fecaca}
.sbox.ora{background:linear-gradient(180deg,#fff7ed 0%,#ffedd5 100%);border:1px solid #fdba74}
.sbox__n{font-size:36px;font-weight:900;color:var(--red)}
.sbox__l{font-size:16px;color:#666;margin-top:5px}
.blink-badge{display:flex;align-items:center;justify-content:center;min-height:62px;background:linear-gradient(90deg,#fb923c,#f97316);border:1px solid #ea580c;border-radius:16px;padding:10px 12px;font-size:21px;font-weight:900;color:#fff;letter-spacing:-.02em;animation:badgeBlink 1.05s ease-in-out infinite;box-shadow:0 10px 24px rgba(249,115,22,.24)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes badgeBlink{0%,100%{transform:scale(1);box-shadow:0 10px 24px rgba(249,115,22,.24)}50%{transform:scale(1.04);box-shadow:0 14px 30px rgba(249,115,22,.38)}}
@keyframes shine{0%{left:-26%;opacity:0}14%{opacity:1}46%{left:108%;opacity:.94}100%{left:108%;opacity:0}}

/* ── FORM ── */
.form-wrap{
  background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
  padding:66px 24px 72px;
  border-top:1px solid #e8f1f8
}
.form-card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 32px rgba(0,0,0,.09);max-width:480px;margin:0 auto;border:1.5px solid #e5e7eb}
.form-logo-area{text-align:center;margin-bottom:10px}
.form-coway-txt{font-family:Arial,sans-serif;font-size:30px;font-weight:900;color:#00b4d8;letter-spacing:-.5px}
.form-eye{display:none}
.form-brand{display:none}
.form-title{text-align:center;font-size:30px;font-weight:900;line-height:1.32;margin-bottom:12px;word-break:keep-all}
.form-title .bl{color:var(--coway)}
.form-assurance{
  margin:0 0 18px;
  padding:18px 16px 14px;
  font-size:15px;
  line-height:1.75;
  color:#475569;
  word-break:keep-all;
  text-align:center;
  border:1px solid #d8eef7;
  border-radius:18px;
  background:linear-gradient(180deg,#f8fdff 0%,#eef8ff 100%);
}
.form-assurance__visual{
  display:flex;align-items:center;justify-content:center;gap:10px;
  margin-bottom:12px;
}
.form-assurance__bars{
  display:flex;gap:4px;align-items:center;justify-content:center;
}
.form-assurance__bars span{
  width:22px;height:10px;border-radius:999px;
  background:#89cff7;
  box-shadow:0 0 0 1px rgba(56,189,248,.18) inset;
  animation:securityBarPulse 1.4s ease-in-out infinite;
}
.form-assurance__bars span:nth-child(2){animation-delay:.12s}
.form-assurance__bars span:nth-child(3){animation-delay:.24s}
.form-assurance__bars span:nth-child(4){animation-delay:.36s}
.form-assurance__lock{
  position:relative;
  width:30px;height:24px;border:3px solid #38a3ea;border-radius:6px;
  background:#fff;box-shadow:0 8px 16px rgba(56,163,234,.12);
}
.form-assurance__lock::before{
  content:'';
  position:absolute;left:50%;bottom:100%;transform:translateX(-50%);
  width:16px;height:12px;border:3px solid #38a3ea;border-bottom:none;border-radius:12px 12px 0 0;
}
.form-assurance__lock::after{
  content:'';
  position:absolute;left:50%;top:7px;transform:translateX(-50%);
  width:6px;height:8px;border-radius:4px;
  background:linear-gradient(180deg,#38a3ea 0%,#1d7fcd 100%);
}
.form-assurance__title{
  font-size:18px;font-weight:900;color:#334155;letter-spacing:-.02em;
}
.form-assurance__title strong{color:#0f4aa3}
.form-assurance__desc{
  margin-top:4px;
  font-size:14px;
  line-height:1.7;
  color:#64748b;
}
.form-assurance__desc strong{color:#0f172a}
.form-assurance__desc br{display:none}
@keyframes securityBarPulse{
  0%,100%{
    background:#70bdf1;
    transform:scaleX(1);
    opacity:.72;
  }
  50%{
    background:#1890f4;
    transform:scaleX(1.08);
    opacity:1;
    box-shadow:0 0 12px rgba(24,144,244,.35);
  }
}
.form-footer{text-align:center;margin-top:12px;font-size:15px;color:#8b95a1;line-height:1.8}
.biz-info{max-width:480px;margin:10px auto 0;padding:0 20px 20px;font-size:14px;line-height:1.8;color:#111827;text-align:center;word-break:keep-all}

.product-modal{
  position:fixed;inset:0;display:none;align-items:center;justify-content:center;
  padding:20px;z-index:10050;background:rgba(2,6,23,.58)
}
.product-modal.open{display:flex}
.product-modal__panel{
  width:min(100%,760px);background:#fff;border-radius:26px;padding:16px;
  box-shadow:0 24px 70px rgba(15,23,42,.28);position:relative;text-align:center
}
.product-modal__close{
  position:absolute;top:12px;right:12px;width:36px;height:36px;border:none;border-radius:50%;
  background:#f8fafc;color:#64748b;font-size:24px;cursor:pointer;line-height:1;
  box-shadow:inset 0 0 0 1px rgba(148,163,184,.35)
}
.product-modal__title{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;border:0
}
.product-modal__visual{position:relative;border-radius:22px;overflow:hidden}
.product-modal__visual img{
  width:100%;height:auto;display:block;border-radius:22px
}
.product-modal__actions{margin-top:14px}
.product-modal__cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;border:none;border-bottom:4px solid #0f4aa3;border-radius:20px;
  background:linear-gradient(180deg,#27b6ff 0%,#1580f5 100%);color:#fff;padding:18px 18px;
  font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:-.02em;
  box-shadow:0 16px 32px rgba(21,128,245,.28), inset 0 1px 0 rgba(255,255,255,.28);
}
.product-modal__cta::after{content:'›';font-size:24px;line-height:1;transform:translateY(-1px)}
.product-modal__subcta{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  margin-top:12px;border:none;background:none;padding:6px 4px;
  color:#0f4aa3;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;
  text-decoration:underline;text-underline-offset:3px
}
.product-modal__subcta::after{content:'›';font-size:18px;line-height:1}
.product-modal__foot{margin-top:10px;font-size:12px;color:#94a3b8}
@media (prefers-reduced-motion: reduce){
  .sticky-cta-btn{animation:none}
  .form-assurance__bars span{animation:none}
}

/* ── 이미지 버튼 한 줄 ── */
.img-btn-row{display:flex;gap:14px;padding:22px 30px;background:#fff;max-width:480px;margin:0 auto}
.img-btn{
  flex:1;border-radius:14px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;
  transition:transform .2s,box-shadow .2s,border-color .2s;
  position:relative;
}
.img-btn:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 12px 28px rgba(0,180,216,.25);border-color:var(--coway)}
.img-btn img{width:100%;display:block;border-radius:12px}
.img-btn-label{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.55));
  color:#fff;font-size:14px;font-weight:700;
  padding:16px 8px 10px;text-align:center;border-radius:0 0 12px 12px;
}

/* ── BENEFITS CARDS ── */
.benefits-wrap{background:#f0fbff;padding:60px 30px;text-align:center}

.sec-title{font-size:clamp(28px,7vw,42px);font-weight:900;line-height:1.28;margin-bottom:16px;word-break:keep-all}

.sec-sub{font-size:18px;color:#666;line-height:1.8;margin-bottom:40px;word-break:keep-all}
.benefits-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:480px;margin:0 auto}
.bcard{background:#fff;border-radius:16px;padding:22px 16px;text-align:left;border:1.5px solid #e5e7eb;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;transform-style:preserve-3d}
.bcard:hover{transform:translateY(-6px) rotateX(6deg) rotateY(-4deg) scale(1.02);box-shadow:0 20px 40px rgba(0,180,216,.18),8px 8px 0 rgba(0,180,216,.08);border-color:var(--coway)}
.bcard.img-card{padding:0;overflow:hidden}

.bcard__icon{font-size:26px;margin-bottom:8px}
.bcard__label{font-size:13px;color:#999;margin-bottom:4px}
.bcard__val{font-size:17px;font-weight:900;line-height:1.4}
.bcard__val .chip{background:#e0f7fa;color:var(--coway);border-radius:5px;padding:2px 6px;font-size:14px}

/* ── STATS ── */
.stats-wrap{background:linear-gradient(155deg,#001f3a 0%,#003060 100%);padding:52px 24px;text-align:center;color:#fff}
.stats-wrap .kicker{color:#67e8f9}
.stats-wrap .sec-title{color:#fff}
.stats-wrap .sec-sub{color:rgba(255,255,255,.6)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:480px;margin:0 auto 40px}
.stat-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px 10px;text-align:center}
.stat-num{font-size:clamp(21px,5vw,30px);font-weight:900;color:#67e8f9;margin-bottom:6px;font-variant-numeric:tabular-nums}

.stats-bottom{font-size:25px;font-weight:900;line-height:1.6}

.compare-wrap{background:#fff;padding:60px 30px;text-align:center}

.compare-tbl td:first-child{font-weight:600;color:#333}

.cb{color:#ef4444}
.compare-foot{background:#e0f7fa;border-radius:12px;padding:16px;max-width:480px;margin:18px auto 0;font-size:16px;font-weight:700;color:var(--coway);text-align:center;line-height:1.7}

/* ── 후기 섹션 ── */
.review-wrap{background:#f0fbff;padding:48px 24px;text-align:center}
.review-grid{display:flex;flex-direction:column;gap:14px;max-width:480px;margin:0 auto}

  background:#fff;border-radius:14px;overflow:hidden;

  display:flex;flex-direction:row;align-items:stretch;

}
.rcard-img-slot{

}
.rcard-img-slot img{width:100%;height:100%;object-fit:cover;display:block}
.rcard-body{padding:18px 16px;text-align:left;flex:1;display:flex;flex-direction:column;justify-content:center}
.rcard-tag{display:inline-block;background:#e0f7fa;color:var(--coway);font-size:14px;font-weight:700;border-radius:20px;padding:4px 12px;margin-bottom:9px}
.rcard-quote{font-size:17px;line-height:1.7;color:#1a1a2e;margin-bottom:9px}
.rcard-quote strong{color:var(--coway);font-size:19px;display:block}
.rcard-info{font-size:14px;color:#9ca3af;border-top:1px solid #f0f0f0;padding-top:8px;margin-top:auto}

/* ── 사은품 안내 ── */
.gift-guide-wrap{background:#fff;padding:48px 24px 32px;text-align:center;scroll-margin-top:84px}
.gift-guide-wrap > *{max-width:480px;margin-left:auto;margin-right:auto}
.gift-guide-title{font-size:30px;font-weight:900;line-height:1.45;color:var(--navy);margin-bottom:16px;word-break:keep-all}
.gift-guide-sub{font-size:14px;line-height:1.7;color:#7b8794;margin-top:16px;word-break:keep-all}
.gift-guide-img{width:100%;height:auto;display:block;border-radius:14px;box-shadow:0 10px 24px rgba(0,0,0,.08)}
.gift-guide-note{display:none}

  font-family:inherit;box-shadow:0 8px 22px rgba(0,180,216,.28)
}

/* ── FAQ ── */
.faq-wrap{background:#fff;padding:60px 30px}
.faq-list{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.faq-item{border:1.5px solid #e5e7eb;border-radius:14px;overflow:hidden}
.faq-q{
  display:flex;align-items:center;justify-content:space-between;

}
.faq-q:hover{background:#f0fbff}
.faq-q.open{background:#f0fbff;color:var(--coway)}
.faq-num{font-size:12px;font-weight:900;color:var(--coway);background:#e0f7fa;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.faq-q-txt{flex:1;line-height:1.5}
.faq-icon{font-size:20px;flex-shrink:0;transition:transform .3s;color:#aaa}
.faq-icon.open{transform:rotate(180deg);color:var(--coway)}
.faq-a{
  display:none;padding:0 20px;background:#f8fdff;
  font-size:17px;color:#444;line-height:1.9;
}
.faq-a.open{display:block;padding:16px 20px 20px}
.faq-tbl{width:100%;border-collapse:collapse;margin-top:12px;font-size:14px}
.faq-tbl th{background:var(--coway);color:#fff;padding:10px 8px;text-align:center;font-size:13px}
.faq-tbl th:first-child{background:#1a1a2e}
.faq-tbl td{padding:10px 8px;border-bottom:1px solid #e5e7eb;vertical-align:top;line-height:1.6}
.faq-tbl td:first-child{font-weight:700;color:#333;text-align:center;white-space:nowrap}
.faq-tbl tr:nth-child(even) td{background:#f0fbff}

/* ── 신청 프로세스 ── */
.process-wrap{background:linear-gradient(155deg,#e8f8fd 0%,#f0fbff 100%);padding:60px 30px;text-align:center;color:#1a1a2e;border-top:3px solid #b3e9f7}
.process-steps{display:flex;flex-direction:column;gap:0;max-width:400px;margin:0 auto}
.pstep{
  display:flex;align-items:flex-start;gap:16px;

  text-align:left;
}
.pstep:last-child{border-bottom:none}

  width:50px;height:50px;border-radius:50%;

  display:flex;align-items:center;justify-content:center;

  box-shadow:0 4px 14px rgba(0,180,216,.4);

.final-wrap{background:linear-gradient(155deg,#001f3a 0%,#003060 60%,#005f9e 100%);padding:64px 30px;text-align:center;color:#fff}
.final-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,180,216,.2);border:1px solid rgba(0,180,216,.4);border-radius:20px;padding:8px 20px;font-size:16px;font-weight:700;margin-bottom:18px}

/* ── STICKY BAR ── */
.sticky-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e5e7eb;z-index:9999;box-shadow:0 -4px 20px rgba(0,0,0,.1)}

.sticky-logo{font-family:Arial,sans-serif;font-size:22px;font-weight:900;color:#00b4d8;letter-spacing:-.5px}
.sticky-cta-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:calc(100% - 28px);margin:5px 14px 11px;border:none;border-bottom:4px solid #0f4aa3;border-radius:22px;
  background:linear-gradient(180deg,#27b6ff 0%,#1580f5 100%);color:#fff;padding:18px 18px;
  font-size:19px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:-.02em;
  transition:transform .16s ease, box-shadow .16s ease, filter .16s ease;
  box-shadow:0 16px 32px rgba(21,128,245,.28), inset 0 1px 0 rgba(255,255,255,.28);
  position:relative;overflow:hidden;animation:productCtaPulse 1.8s ease-in-out infinite
}
.sticky-cta-btn::before{content:"";position:absolute;top:-45%;bottom:-45%;left:-22%;width:30%;transform:skewX(-22deg);background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.96),rgba(255,239,138,.88),rgba(255,255,255,0));animation:shine 2.8s ease-in-out infinite}
.sticky-cta-btn::after{content:'›';position:relative;z-index:1;font-size:24px;line-height:1;transform:translateY(-1px)}

.sticky-cta-btn:active{transform:translateY(2px);box-shadow:0 8px 18px rgba(21,128,245,.22), inset 0 1px 0 rgba(255,255,255,.2)}

<script>

/* ── 카운트다운 (오늘 자정까지) ── */
function updateCountdown(){
  const now=new Date();
  const midnight=new Date(now);
  midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);
  document.getElementById('cdH').textContent=String(h).padStart(2,'0');
  document.getElementById('cdM').textContent=String(m).padStart(2,'0');
  document.getElementById('cdS').textContent=String(s).padStart(2,'0');
  document.getElementById('cdLabel').textContent=h+'시간 '+m+'분 '+s+'초';
}
updateCountdown();
setInterval(updateCountdown,1000);

/* ── 신청 카운터 (스크롤 도달 시 시작) ── */
let applyN=63;const MAX=100;
function setApplyDisplay(n){
  const headerApplyNum=document.getElementById('headerApplyNum');
  const applyNum=document.getElementById('applyNum');
  const applyNum2=document.getElementById('applyNum2');
  const remainNum=document.getElementById('remainNum');
  const finalNum=document.getElementById('finalNum');
  const progressFill=document.getElementById('progressFill');
  const liveRemainCount=document.getElementById('liveRemainCount');
  if(headerApplyNum)headerApplyNum.textContent=n;
  if(applyNum)applyNum.textContent=n;
  if(applyNum2)applyNum2.textContent=n;
  if(remainNum)remainNum.textContent=MAX-n;
  if(finalNum)finalNum.textContent=n;
  if(liveRemainCount)liveRemainCount.textContent=(MAX-n).toLocaleString('ko-KR');
  if(progressFill)progressFill.style.width=(n/MAX*100)+'%';
}
setApplyDisplay(applyN);
const liveApplyCount=document.getElementById('liveApplyCount');
if(liveApplyCount)liveApplyCount.textContent=applyN.toLocaleString('ko-KR');

/* ── 스크롤 reveal ── */
const reveals=document.querySelectorAll('.reveal');
const revObs=new IntersectionObserver(function(entries){
  entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');}});
},{threshold:.1});
reveals.forEach(function(el){revObs.observe(el);});

/* ── 통계 카운터 ── */
function animStat(el){
  const target=parseInt(el.dataset.target);const suffix=el.dataset.suffix||'';
  const dur=2200;const t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);const e=1-Math.pow(1-p,4);const v=Math.floor(e*target);
    el.textContent=(target>=1000?v.toLocaleString():v)+suffix;
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
let statsRan=false;
const statsSection=document.getElementById('stats');
if(statsSection){
  new IntersectionObserver(function(entries){
    if(entries[0].isIntersecting&&!statsRan){statsRan=true;document.querySelectorAll('[data-target]').forEach(animStat);}
  },{threshold:.25}).observe(statsSection);
}

/* ── FAQ 토글 ── */
function toggleFaq(el){
  const a=el.nextElementSibling;
  const icon=el.querySelector('.faq-icon');
  const isOpen=a.classList.contains('open');
  document.querySelectorAll('.faq-a.open').forEach(function(x){x.classList.remove('open');});
  document.querySelectorAll('.faq-q.open').forEach(function(x){x.classList.remove('open');});
  document.querySelectorAll('.faq-icon.open').forEach(function(x){x.classList.remove('open');});
  if(!isOpen){a.classList.add('open');el.classList.add('open');icon.classList.add('open');}
}

/* ── CTA 클릭 추적 ── */
function trackCtaClick(ctaName){
  window.dataLayer=window.dataLayer||[];
  window.dataLayer.push({
    event:'cta_click',
    cta_name:ctaName,
    page_path:location.pathname,
    page_title:document.title
  });
}

function handleCtaClick(ctaName){
  trackCtaClick(ctaName);
  scrollToForm();
}

function handleSectionCtaClick(ctaName,sectionId){
  trackCtaClick(ctaName);
  scrollToSection(sectionId);
}

const PRODUCT_MAP={
  product_switch_purifier:{label:'스위치 정수기 냉온'},
  product_icon_ice:{label:'아이콘 얼음정수기'},
  product_bidet:{label:'베디 비데'},
  product_air_purifier:{label:'노블 공기청정기'}
};
let pendingProductCta='';
let pendingProductLabel='';

function handleProductInterest(ctaName,label){
  trackCtaClick(ctaName);
  pendingProductCta=ctaName;
  pendingProductLabel=label;
  openProductModal(ctaName,label);
}

function openProductModal(ctaName,label){
  const modal=document.getElementById('productModal');
  const title=document.getElementById('productModalTitle');
  const info=PRODUCT_MAP[ctaName]||{label:label};
  if(title)title.textContent=(info.label||label||'선택 제품')+' 혜택 안내';
  if(modal){
    modal.classList.add('open');
    modal.setAttribute('aria-hidden','false');
  }
  document.body.style.overflow='hidden';
}

function closeProductModal(){
  const modal=document.getElementById('productModal');
  if(modal){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden','true');
  }
  document.body.style.overflow='';
}

function confirmProductInterest(){
  const label=pendingProductLabel||(PRODUCT_MAP[pendingProductCta]&&PRODUCT_MAP[pendingProductCta].label)||'선택 제품';
  window.dataLayer=window.dataLayer||[];
  window.dataLayer.push({
    event:'product_interest',
    product_label:label,
    page_path:location.pathname,
    page_title:document.title
  });
  closeProductModal();
  scrollToForm();
}

function openGiftGuideFromModal(){
  trackCtaClick('product_modal_gift_guide');
  closeProductModal();
  scrollToSection('gift-guide');
}

/* ── 폼 스크롤 ── */
function scrollToForm(){document.getElementById('form').scrollIntoView({behavior:'smooth'});}
function scrollToSection(sectionId){
  const target=document.getElementById(sectionId);
  if(!target)return;
  const header=document.querySelector('.site-header');
  const headerOffset=header?header.offsetHeight+12:12;
  const move=function(){
    const top=window.scrollY+target.getBoundingClientRect().top-headerOffset;
    window.scrollTo({top,behavior:'smooth'});
  };
  move();
  setTimeout(move,420);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeProductModal();}
});
document.getElementById('productModal').addEventListener('click',function(e){
  if(e.target===this){closeProductModal();}
});
</script>
